<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="백색소음">
  <meta name="description" content="신생아 수면을 위한 백색소음 앱">
  <title>백색소음 🌙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a16;
      --card: #16162a;
      --card-active: #1e1e38;
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(160,140,255,0.4);
      --text: #e8e6f0;
      --text-muted: #8884a0;
      --accent: #a08cff;
      --accent2: #c4b5fd;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body { font-family: 'Gowun Dodum', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s); }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,0.5)} }

    .app {
      position: relative; z-index: 1; max-width: 480px; margin: 0 auto;
      padding: calc(var(--safe-top) + 1.5rem) 1.2rem calc(var(--safe-bottom) + 2rem);
      min-height: 100dvh;
    }

    .header { text-align: center; margin-bottom: 2rem; }
    .moon { font-size: 3rem; display: block; margin-bottom: 0.6rem; animation: moonFloat 5s ease-in-out infinite; filter: drop-shadow(0 0 18px rgba(255,220,100,0.4)); }
    @keyframes moonFloat { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
    .title { font-family: 'Noto Serif KR', serif; font-weight: 300; font-size: clamp(22px,6vw,30px); letter-spacing: 0.2em; color: var(--text); text-shadow: 0 0 30px rgba(160,140,255,0.3); }
    .subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; margin-top: 0.3rem; }

    .grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 1.4rem; }

    .sound-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 18px;
      padding: 1.1rem 0.6rem 1rem; cursor: pointer; transition: all 0.3s ease;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
      position: relative; overflow: hidden; font-family: 'Gowun Dodum', sans-serif;
      -webkit-appearance: none; appearance: none; touch-action: manipulation; user-select: none;
    }
    .sound-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: 18px;
      background: radial-gradient(circle at 50% 0%, rgba(160,140,255,0.08), transparent 70%);
      opacity: 0; transition: opacity 0.3s;
    }
    .sound-btn:active { transform: scale(0.96); }
    .sound-btn.active { background: var(--card-active); border-color: var(--border-active); box-shadow: 0 0 24px rgba(160,140,255,0.18), inset 0 0 20px rgba(160,140,255,0.05); }
    .sound-btn.active::before { opacity: 1; }

    .sound-icon { font-size: clamp(24px,7vw,30px); line-height: 1; transition: transform 0.3s ease; }
    .sound-btn.active .sound-icon { animation: iconPulse 2.5s ease-in-out infinite; }
    @keyframes iconPulse { 0%,100%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.15);filter:brightness(1.3)} }

    .sound-name { font-size: clamp(12px,3.5vw,14px); font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
    .sound-btn.active .sound-name { color: var(--accent2); }
    .sound-desc { font-size: 10px; color: var(--text-muted); text-align: center; line-height: 1.3; }

    .playing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); opacity: 0; transition: opacity 0.3s; animation: dotBlink 1.5s ease-in-out infinite; }
    .sound-btn.active .playing-dot { opacity: 1; }
    @keyframes dotBlink { 0%,100%{opacity:0.4} 50%{opacity:1} }

    .controls { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 1.2rem 1.3rem; margin-bottom: 1rem; }
    .vol-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
    .vol-icon { font-size: 18px; flex-shrink: 0; }
    .vol-track { flex: 1; }
    input[type=range] { width: 100%; height: 4px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px rgba(160,140,255,0.5); cursor: pointer; }
    .vol-val { font-size: 13px; color: var(--accent2); min-width: 36px; text-align: right; flex-shrink: 0; }

    .timer-row { display: flex; align-items: center; gap: 8px; }
    .timer-label { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .timer-options { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
    .timer-btn { font-family: 'Gowun Dodum', sans-serif; font-size: 11px; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
    .timer-btn.selected { background: rgba(160,140,255,0.15); border-color: var(--accent); color: var(--accent2); }
    #timerDisplay { font-size: 11px; color: var(--accent); min-width: 50px; text-align: right; flex-shrink: 0; }

    .wave-wrap { display: flex; align-items: center; justify-content: center; gap: 4px; height: 36px; margin: 0.5rem 0 0.3rem; }
    .w-bar { width: 3px; background: var(--accent); border-radius: 2px; opacity: 0.2; height: 4px; }
    .playing .w-bar { opacity: 0.7; }
    .playing .w-bar:nth-child(1)  { animation: wb 1.1s ease-in-out infinite 0.0s; }
    .playing .w-bar:nth-child(2)  { animation: wb 0.8s ease-in-out infinite 0.1s; }
    .playing .w-bar:nth-child(3)  { animation: wb 1.3s ease-in-out infinite 0.2s; }
    .playing .w-bar:nth-child(4)  { animation: wb 0.9s ease-in-out infinite 0.0s; }
    .playing .w-bar:nth-child(5)  { animation: wb 1.5s ease-in-out infinite 0.3s; }
    .playing .w-bar:nth-child(6)  { animation: wb 0.7s ease-in-out infinite 0.1s; }
    .playing .w-bar:nth-child(7)  { animation: wb 1.2s ease-in-out infinite 0.2s; }
    .playing .w-bar:nth-child(8)  { animation: wb 0.9s ease-in-out infinite 0.0s; }
    .playing .w-bar:nth-child(9)  { animation: wb 1.0s ease-in-out infinite 0.1s; }
    .playing .w-bar:nth-child(10) { animation: wb 1.4s ease-in-out infinite 0.3s; }
    .playing .w-bar:nth-child(11) { animation: wb 0.8s ease-in-out infinite 0.2s; }
    .playing .w-bar:nth-child(12) { animation: wb 1.1s ease-in-out infinite 0.0s; }
    @keyframes wb { 0%,100%{height:4px} 50%{height:26px} }

    .status { text-align: center; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; min-height: 18px; }
    .tip { text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 1.5rem; letter-spacing: 0.05em; line-height: 1.6; }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <header class="header">
    <span class="moon">🌙</span>
    <h1 class="title">백색소음</h1>
    <p class="subtitle">우리 아기의 포근한 잠자리</p>
  </header>
  <div class="grid" id="soundGrid"></div>
  <div class="controls">
    <div class="vol-row">
      <span class="vol-icon">🔈</span>
      <div class="vol-track"><input type="range" id="volSlider" min="0" max="100" value="70" step="1"></div>
      <span class="vol-val" id="volVal">70%</span>
    </div>
    <div class="timer-row">
      <span class="timer-label">타이머</span>
      <div class="timer-options">
        <button class="timer-btn selected" data-min="0">없음</button>
        <button class="timer-btn" data-min="15">15분</button>
        <button class="timer-btn" data-min="30">30분</button>
        <button class="timer-btn" data-min="60">1시간</button>
      </div>
      <span id="timerDisplay"></span>
    </div>
  </div>
  <div class="wave-wrap" id="waveWrap">
    <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
    <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
    <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
    <div class="w-bar"></div><div class="w-bar"></div><div class="w-bar"></div>
  </div>
  <p class="status" id="status">버튼을 눌러 소리를 재생하세요</p>
  <p class="tip">화면을 켜둔 채로 두세요 🌟<br>소리는 백그라운드에서도 재생돼요</p>
</div>

<script>
/* 별 배경 */
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 0.5;
  s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${0.3+Math.random()*0.6}`;
  starsEl.appendChild(s);
}

const sounds = [
  { id:'rain',    icon:'🌧️', name:'빗소리',      desc:'촉촉한 빗줄기' },
  { id:'ocean',   icon:'🌊', name:'파도소리',     desc:'잔잔한 해변' },
  { id:'white',   icon:'📻', name:'화이트노이즈',  desc:'순수 백색소음' },
  { id:'fan',     icon:'🌀', name:'선풍기',       desc:'부드러운 바람' },
  { id:'forest',  icon:'🌲', name:'숲속',         desc:'새소리 · 바람' },
  { id:'womb',    icon:'🫀', name:'심장박동',     desc:'엄마 뱃속 소리' },
  { id:'stream',  icon:'💧', name:'시냇물',       desc:'맑은 물흐름' },
  { id:'lullaby', icon:'🎵', name:'자장가',        desc:'포근한 멜로디' },
  { id:'vacuum',  icon:'🤫', name:'청소기',        desc:'낮고 일정한 소음' },
  { id:'dryer',   icon:'🌪️', name:'건조기',       desc:'둥글게 돌아가는' },
];

const AC = window.AudioContext || window.webkitAudioContext;
let ctx, masterGain;
let currentNodes = [];
let currentId = null;
let timerMin = 0, timerInterval = null, timerEnd = null;
let scheduledTimeouts = []; // 전역 타임아웃 추적

function initCtx() {
  if (ctx) return;
  ctx = new AC();
  masterGain = ctx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(ctx.destination);
}

function makeNoise(sec = 4) {
  const sr = ctx.sampleRate, len = sr * sec;
  const buf = ctx.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  return src;
}

function makeFilter(type, freq, q = 1) {
  const f = ctx.createBiquadFilter();
  f.type = type; f.frequency.value = freq; f.Q.value = q;
  return f;
}

function makeGain(v) {
  const g = ctx.createGain(); g.gain.value = v; return g;
}

function ch(...nodes) {
  for (let i = 0; i < nodes.length - 1; i++) nodes[i].connect(nodes[i+1]);
  return nodes[nodes.length - 1];
}

/* ─── 소리 합성 ─── */

function synthRain() {
  const nodes = [];
  // 빗소리 배경 (중주파 밴드패스)
  const bg = makeNoise(4);
  const bgF = makeFilter('bandpass', 1100, 0.6);
  const bgG = makeGain(0.28);
  ch(bg, bgF, bgG, masterGain); bg.start(); nodes.push(bg);
  // 빗방울 고주파 레이어
  const hi = makeNoise(3);
  const hiF = makeFilter('highpass', 5000, 0.4);
  const hiG = makeGain(0.12);
  ch(hi, hiF, hiG, masterGain); hi.start(); nodes.push(hi);
  // 저음 빗소리 밀도감
  const lo = makeNoise(5);
  const loF = makeFilter('lowpass', 300, 0.8);
  const loG = makeGain(0.1);
  ch(lo, loF, loG, masterGain); lo.start(); nodes.push(lo);
  // 비 세기 변화 LFO
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.25;
  const lfoG = makeGain(0.07);
  lfo.connect(lfoG); lfoG.connect(bgG.gain); lfo.start(); nodes.push(lfo);
  return nodes;
}

function synthOcean() {
  const nodes = [];
  const noise = makeNoise(6);
  const lpf = makeFilter('lowpass', 480, 0.7);
  const wG = makeGain(0.45);
  ch(noise, lpf, wG, masterGain); noise.start(); nodes.push(noise);
  // 파도 밀려옴/빠짐 LFO (약 8초 주기)
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.12;
  const lfoG = makeGain(0.38);
  lfo.connect(lfoG); lfoG.connect(wG.gain); lfo.start(); nodes.push(lfo);
  // 파도 거품 고주파
  const foam = makeNoise(4);
  const fF = makeFilter('bandpass', 3000, 1.2);
  const fG = makeGain(0.06);
  ch(foam, fF, fG, masterGain); foam.start(); nodes.push(foam);
  // 거품도 파도 주기에 맞춤
  const lfo2 = ctx.createOscillator();
  lfo2.type = 'sine'; lfo2.frequency.value = 0.12;
  const lfoG2 = makeGain(0.05);
  lfo2.connect(lfoG2); lfoG2.connect(fG.gain); lfo2.start(); nodes.push(lfo2);
  return nodes;
}

function synthWhite() {
  const nodes = [];
  const n = makeNoise(4);
  const g = makeGain(0.4);
  ch(n, g, masterGain); n.start(); nodes.push(n);
  return nodes;
}

function synthFan() {
  const nodes = [];
  // 팬 노이즈
  const noise = makeNoise(4);
  const lpf = makeFilter('lowpass', 750, 0.5);
  const nG = makeGain(0.32);
  ch(noise, lpf, nG, masterGain); noise.start(); nodes.push(noise);
  // 모터 험 (60Hz)
  const motor = ctx.createOscillator();
  motor.type = 'sawtooth'; motor.frequency.value = 60;
  const mF = makeFilter('lowpass', 200, 2);
  const mG = makeGain(0.05);
  ch(motor, mF, mG, masterGain); motor.start(); nodes.push(motor);
  // 날개 회전 맥동 (3Hz)
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 3;
  const lG = makeGain(0.03);
  lfo.connect(lG); lG.connect(nG.gain); lfo.start(); nodes.push(lfo);
  return nodes;
}

function synthForest() {
  const nodes = [];
  // 숲 바람
  const wind = makeNoise(5);
  const wF = makeFilter('bandpass', 550, 0.4);
  const wG = makeGain(0.28);
  ch(wind, wF, wG, masterGain); wind.start(); nodes.push(wind);
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.18;
  const lG = makeGain(0.12);
  lfo.connect(lG); lG.connect(wG.gain); lfo.start(); nodes.push(lfo);
  // 나뭇잎 바스락
  const leaf = makeNoise(3);
  const lF = makeFilter('highpass', 3500, 0.6);
  const leafG = makeGain(0.07);
  ch(leaf, lF, leafG, masterGain); leaf.start(); nodes.push(leaf);
  // 새소리 (불규칙 반복 톤)
  let birdActive = true;
  function chirp() {
    if (!birdActive || !ctx) return;
    const o = ctx.createOscillator();
    o.type = 'sine';
    o.frequency.value = 2000 + Math.random() * 1200;
    const g = makeGain(0);
    ch(o, g, masterGain);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.045, now + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o.start(now); o.stop(now + 0.32);
    const tid = setTimeout(chirp, 3500 + Math.random() * 6000);
    scheduledTimeouts.push(tid);
  }
  chirp();
  nodes.push({ stop: () => { birdActive = false; } });
  return nodes;
}

function synthWomb() {
  const nodes = [];
  // 자궁 내 혈류음 (배경 저음)
  const bg = makeNoise(4);
  const lpf = makeFilter('lowpass', 140, 1.2);
  const bgG = makeGain(0.18);
  ch(bg, lpf, bgG, masterGain); bg.start(); nodes.push(bg);

  // LUB-DUB 심장박동 스케줄러 (BPM 65)
  let beatActive = true;
  const bpm = 65;
  const beatInterval = 60 / bpm; // 약 0.92초

  function lub(t) {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = 52;
    const g = makeGain(0);
    ch(o, g, masterGain);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.75, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.22);
  }

  function dub(t) {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = 68;
    const g = makeGain(0);
    ch(o, g, masterGain);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.38, t + 0.009);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
    o.start(t); o.stop(t + 0.15);
  }

  let nextBeat = ctx.currentTime + 0.1;
  function scheduleBeat() {
    if (!beatActive) return;
    while (nextBeat < ctx.currentTime + 2.0) {
      lub(nextBeat);
      dub(nextBeat + 0.26);
      nextBeat += beatInterval;
    }
    const tid = setTimeout(scheduleBeat, 400);
    scheduledTimeouts.push(tid);
  }
  scheduleBeat();
  nodes.push({ stop: () => { beatActive = false; } });
  return nodes;
}

function synthStream() {
  const nodes = [];
  const water = makeNoise(4);
  const bpf = makeFilter('bandpass', 1600, 0.5);
  const wG = makeGain(0.38);
  ch(water, bpf, wG, masterGain); water.start(); nodes.push(water);
  // 졸졸 고음
  const hi = makeNoise(3);
  const hF = makeFilter('highpass', 4000, 0.7);
  const hG = makeGain(0.1);
  ch(hi, hF, hG, masterGain); hi.start(); nodes.push(hi);
  // 잔물결 LFO
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 1.8;
  const lG = makeGain(0.09);
  lfo.connect(lG); lG.connect(wG.gain); lfo.start(); nodes.push(lfo);
  return nodes;
}

function synthLullaby() {
  const nodes = [];
  // 배경 부드러운 패드
  const pad = makeNoise(4);
  const lpf = makeFilter('lowpass', 350, 0.5);
  const pG = makeGain(0.05);
  ch(pad, lpf, pG, masterGain); pad.start(); nodes.push(pad);

  // 작은별 (C장조): 도도솔솔라라솔 / 파파미미레레도
  const notes = [261.63,261.63,392.00,392.00,440.00,440.00,392.00,
                 349.23,349.23,329.63,329.63,293.66,293.66,261.63];
  const dur = 0.65;
  let melodyActive = true;

  function playMelody() {
    if (!melodyActive || !ctx) return;
    let t = ctx.currentTime + 0.1;
    notes.forEach(freq => {
      const o = ctx.createOscillator();
      o.type = 'triangle'; o.frequency.value = freq;
      // 비브라토
      const vib = ctx.createOscillator();
      vib.frequency.value = 5;
      const vibG = makeGain(2.5);
      vib.connect(vibG); vibG.connect(o.frequency);
      const g = makeGain(0);
      ch(o, g, masterGain);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.06);
      g.gain.setValueAtTime(0.13, t + dur - 0.08);
      g.gain.linearRampToValueAtTime(0, t + dur - 0.02);
      o.start(t); vib.start(t);
      o.stop(t + dur); vib.stop(t + dur);
      t += dur;
    });
    const tid = setTimeout(playMelody, notes.length * dur * 1000 + 2500);
    scheduledTimeouts.push(tid);
    nodes.push({ stop: () => { melodyActive = false; } });
  }
  playMelody();
  return nodes;
}

function synthVacuum() {
  const nodes = [];
  // 모터 저음 험
  const motor = ctx.createOscillator();
  motor.type = 'sawtooth'; motor.frequency.value = 105;
  const mF = makeFilter('lowpass', 280, 2);
  const mG = makeGain(0.2);
  ch(motor, mF, mG, masterGain); motor.start(); nodes.push(motor);
  // 흡입 광대역 노이즈
  const suction = makeNoise(4);
  const sF = makeFilter('bandpass', 850, 0.4);
  const sG = makeGain(0.32);
  ch(suction, sF, sG, masterGain); suction.start(); nodes.push(suction);
  // 아주 느린 맥동
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.07;
  const lG = makeGain(0.04);
  lfo.connect(lG); lG.connect(sG.gain); lfo.start(); nodes.push(lfo);
  return nodes;
}

function synthDryer() {
  const nodes = [];
  // 모터 배경
  const bg = makeNoise(4);
  const lpf = makeFilter('lowpass', 380, 0.5);
  const bgG = makeGain(0.25);
  ch(bg, lpf, bgG, masterGain); bg.start(); nodes.push(bg);
  // 드럼 회전 쿵 (약 1.1초 간격)
  let dryerActive = true;
  function drum() {
    if (!dryerActive || !ctx) return;
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = 75;
    const g = makeGain(0);
    ch(o, g, masterGain);
    const now = ctx.currentTime;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.32, now + 0.018);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
    o.start(now); o.stop(now + 0.32);
    const tid = setTimeout(drum, 1100 + Math.random() * 80);
    scheduledTimeouts.push(tid);
  }
  drum();
  nodes.push({ stop: () => { dryerActive = false; } });
  // 고주파 덜컹
  const rattle = makeNoise(3);
  const rF = makeFilter('highpass', 2200, 0.8);
  const rG = makeGain(0.04);
  ch(rattle, rF, rG, masterGain); rattle.start(); nodes.push(rattle);
  return nodes;
}

const synthMap = {
  rain: synthRain, ocean: synthOcean, white: synthWhite,
  fan: synthFan, forest: synthForest, womb: synthWomb,
  stream: synthStream, lullaby: synthLullaby,
  vacuum: synthVacuum, dryer: synthDryer,
};

function stopAll() {
  // 타임아웃 정리
  scheduledTimeouts.forEach(id => clearTimeout(id));
  scheduledTimeouts = [];
  // 오디오 노드 정리
  currentNodes.forEach(n => {
    if (n && typeof n.stop === 'function') { try { n.stop(); } catch(e){} }
  });
  currentNodes = [];
  if (currentId) {
    document.querySelector(`[data-id="${currentId}"]`)?.classList.remove('active');
    currentId = null;
  }
  document.getElementById('waveWrap').classList.remove('playing');
  document.getElementById('status').textContent = '버튼을 눌러 소리를 재생하세요';
  clearInterval(timerInterval);
  document.getElementById('timerDisplay').textContent = '';
}

function playSound(sound, btn) {
  initCtx();
  if (ctx.state === 'suspended') ctx.resume();
  if (currentId === sound.id) { stopAll(); return; }
  stopAll();
  currentNodes = synthMap[sound.id]();
  currentId = sound.id;
  btn.classList.add('active');
  document.getElementById('waveWrap').classList.add('playing');
  document.getElementById('status').textContent = `🎵 ${sound.name} 재생 중`;
  if (timerMin > 0) startTimer(timerMin);
}

/* 버튼 생성 */
const grid = document.getElementById('soundGrid');
sounds.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'sound-btn'; btn.dataset.id = s.id;
  btn.innerHTML = `<span class="sound-icon">${s.icon}</span><span class="sound-name">${s.name}</span><span class="sound-desc">${s.desc}</span><div class="playing-dot"></div>`;
  btn.addEventListener('click', () => playSound(s, btn));
  grid.appendChild(btn);
});

/* 볼륨 */
document.getElementById('volSlider').addEventListener('input', e => {
  document.getElementById('volVal').textContent = e.target.value + '%';
  if (masterGain) masterGain.gain.value = e.target.value / 100;
});

/* 타이머 */
function startTimer(min) {
  clearInterval(timerInterval);
  timerEnd = Date.now() + min * 60 * 1000;
  timerInterval = setInterval(() => {
    const left = timerEnd - Date.now();
    if (left <= 0) { clearInterval(timerInterval); stopAll(); document.getElementById('timerDisplay').textContent = ''; return; }
    const m = Math.floor(left / 60000), s = Math.floor((left % 60000) / 1000);
    document.getElementById('timerDisplay').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

document.querySelectorAll('.timer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    timerMin = parseInt(btn.dataset.min);
    clearInterval(timerInterval);
    document.getElementById('timerDisplay').textContent = '';
    if (timerMin > 0 && currentId) startTimer(timerMin);
  });
});

/* 화면 꺼짐 방지 */
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e){}
}
requestWakeLock();
</script>
